services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Build-time public variables — baked into the JS bundle.
        # Changing these requires rebuilding the image (docker compose build).
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    image: spl-frontend:latest
    container_name: spl-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Uncomment to connect to a backend service on the same compose network:
  # networks:
  #   default:
  #     external: true
  #     name: spl-network
