services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: methodology-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - keycloak

  postgres:
    image: postgres:16-alpine
    container_name: methodology-postgres
    environment:
      POSTGRES_DB: methodology
      POSTGRES_USER: methodology
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    container_name: methodology-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"

volumes:
  postgres_data:
