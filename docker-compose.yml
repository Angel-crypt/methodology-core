services:

  mock:
    build:
      context: ./mock
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx.mock.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      mock:
        condition: service_healthy

networks:
  default:
    name: sctda-mock
