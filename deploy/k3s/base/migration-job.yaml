apiVersion: batch/v1
kind: Job
metadata:
  name: backend-migration
  namespace: methodology
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migration
          image: methodology-backend:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              DB_PASSWORD="$(cat /run/secrets/db_primary_password)"
              export DATABASE_URL="postgresql://methodology:${DB_PASSWORD}@postgres-primary:5432/methodology"
              alembic upgrade head
          volumeMounts:
            - name: secrets
              mountPath: /run/secrets
              readOnly: true
      volumes:
        - name: secrets
          secret:
            secretName: methodology-secrets
            items:
              - key: db_primary_password
                path: db_primary_password
