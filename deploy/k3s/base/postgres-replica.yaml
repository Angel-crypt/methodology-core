apiVersion: v1
kind: Service
metadata:
  name: postgres-replica
  namespace: methodology
spec:
  selector:
    app: postgres-replica
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-replica
  namespace: methodology
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-replica
  template:
    metadata:
      labels:
        app: postgres-replica
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: methodology
            - name: POSTGRES_DB
              value: methodology
            - name: POSTGRES_PASSWORD_FILE
              value: /run/secrets/db_replica_password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: secrets
              mountPath: /run/secrets
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-replica-pvc
        - name: secrets
          secret:
            secretName: methodology-secrets
            items:
              - key: db_replica_password
                path: db_replica_password
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-replica-pvc
  namespace: methodology
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
