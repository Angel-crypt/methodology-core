apiVersion: v1
kind: Service
metadata:
  name: mock-server
  namespace: methodology
spec:
  selector:
    app: mock-server
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-server
  namespace: methodology
spec:
  replicas: 0
  selector:
    matchLabels:
      app: mock-server
  template:
    metadata:
      labels:
        app: mock-server
    spec:
      containers:
        - name: mock-server
          image: methodology-mock:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: production
            - name: USE_MOCK
              value: "true"
          ports:
            - containerPort: 3000
