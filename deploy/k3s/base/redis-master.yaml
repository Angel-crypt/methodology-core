apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: methodology
spec:
  selector:
    app: redis-master
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-master
  namespace: methodology
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-master
  template:
    metadata:
      labels:
        app: redis-master
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - sh
            - -ec
            - |
              REDIS_PASSWORD="$(cat /run/secrets/redis_password)"
              exec redis-server --appendonly yes --requirepass "$REDIS_PASSWORD"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: secrets
              mountPath: /run/secrets
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-master-pvc
        - name: secrets
          secret:
            secretName: methodology-secrets
            items:
              - key: redis_password
                path: redis_password
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-master-pvc
  namespace: methodology
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
