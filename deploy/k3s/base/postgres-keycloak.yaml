apiVersion: v1
kind: Service
metadata:
  name: postgres-keycloak
  namespace: methodology
spec:
  selector:
    app: postgres-keycloak
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-keycloak
  namespace: methodology
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-keycloak
  template:
    metadata:
      labels:
        app: postgres-keycloak
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER_FILE
              value: /run/secrets/db_keycloak_user
            - name: POSTGRES_PASSWORD_FILE
              value: /run/secrets/db_keycloak_password
            - name: POSTGRES_DB
              value: keycloak
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: secrets
              mountPath: /run/secrets
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-keycloak-pvc
        - name: secrets
          secret:
            secretName: methodology-secrets
            items:
              - key: db_keycloak_user
                path: db_keycloak_user
              - key: db_keycloak_password
                path: db_keycloak_password
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-keycloak-pvc
  namespace: methodology
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
