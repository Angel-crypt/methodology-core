---
- name: Create Kubernetes Secret manifest and apply
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../vars/secrets.yml
  tasks:
    - name: Render secret manifest from template
      ansible.builtin.template:
        src: ../templates/methodology-secret.yaml.j2
        dest: "{{ playbook_dir }}/../../deploy/k3s/secret.generated.yaml"
        mode: "0600"

    - name: Ensure namespace exists
      ansible.builtin.command: kubectl --kubeconfig {{ playbook_dir }}/../../deploy/k3s/kubeconfig apply -f {{ playbook_dir }}/../../deploy/k3s/base/namespace.yaml

    - name: Apply secrets
      ansible.builtin.command: kubectl --kubeconfig {{ playbook_dir }}/../../deploy/k3s/kubeconfig apply -f {{ playbook_dir }}/../../deploy/k3s/secret.generated.yaml
