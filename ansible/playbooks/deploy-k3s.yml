---
- name: Deploy k3s manifests and run migration
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../vars/secrets.yml
  tasks:
    - name: Apply overlay
      ansible.builtin.command: kubectl --kubeconfig {{ playbook_dir }}/../../deploy/k3s/kubeconfig apply -k {{ kustomize_overlay }}

    - name: Delete migration job if exists
      ansible.builtin.command: kubectl --kubeconfig {{ playbook_dir }}/../../deploy/k3s/kubeconfig -n {{ namespace }} delete job backend-migration --ignore-not-found
      when: kustomize_overlay is search('real')

    - name: Recreate migration job
      ansible.builtin.command: kubectl --kubeconfig {{ playbook_dir }}/../../deploy/k3s/kubeconfig -n {{ namespace }} apply -f {{ playbook_dir }}/../../deploy/k3s/base/migration-job.yaml
      when: kustomize_overlay is search('real')

    - name: Wait migration completion
      ansible.builtin.command: kubectl --kubeconfig {{ playbook_dir }}/../../deploy/k3s/kubeconfig -n {{ namespace }} wait --for=condition=complete --timeout=180s job/backend-migration
      when: kustomize_overlay is search('real')

    - name: Rollout backend
      ansible.builtin.command: kubectl --kubeconfig {{ playbook_dir }}/../../deploy/k3s/kubeconfig -n {{ namespace }} rollout status deployment/backend --timeout=180s
      when: kustomize_overlay is search('real')

    - name: Rollout frontend
      ansible.builtin.command: kubectl --kubeconfig {{ playbook_dir }}/../../deploy/k3s/kubeconfig -n {{ namespace }} rollout status deployment/frontend --timeout=180s
